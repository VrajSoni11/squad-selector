<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Squad Selection</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">

</head>

<body>

<div class="squad-page">

  <div class="container">

    <a href="/" class="back-btn">
      ← Back
    </a>

    <div class="team-header">

      <h1 id="teamTitle"></h1>

      <p>
        FIFA WC 2026 Squad Management
      </p>

    </div>

    <div class="add-player-bar">

      <input
        type="text"
        id="playerName"
        placeholder="Player Name"
      >

      <input
        type="text"
        id="playerPositions"
        placeholder="Positions (GK, CB, ST)"
      >

      <input
        type="number"
        id="playerAge"
        placeholder="Age"
      >

      <input
        type="text"
        id="playerClub"
        placeholder="Club"
      >

      <button onclick="addPlayer()">
        Add Player
      </button>

    </div>

    <div class="squad-layout">

      <!-- SQUAD POOL -->
      <div class="holding-zone">

        <h2>
          Squad Pool
        </h2>

        <div
          class="players zone-drop"
          id="zone-0"
        ></div>

      </div>

      <!-- ZONES -->
      <div class="zones-grid">

        <div class="zone">
          <h2>Golden Ticket</h2>
          <div class="players zone-drop" id="zone-1"></div>
        </div>

        <div class="zone">
          <h2>Almost There</h2>
          <div class="players zone-drop" id="zone-2"></div>
        </div>

        <div class="zone">
          <h2>On Radar</h2>
          <div class="players zone-drop" id="zone-3"></div>
        </div>

        <div class="zone">
          <h2>Chances Exist</h2>
          <div class="players zone-drop" id="zone-4"></div>
        </div>

        <div class="zone">
          <h2>Very Tough</h2>
          <div class="players zone-drop" id="zone-5"></div>
        </div>

      </div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script src="team.js"></script>

</body>
</html>
